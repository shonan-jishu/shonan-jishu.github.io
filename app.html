<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>夏休み自習室 開放カレンダー</title>

  <!-- ホーム画面用アイコン(同じフォルダに画像を置いてください) -->
  <link rel="apple-touch-icon" sizes="180x180" href="./icon-180.png">
  <link rel="icon" href="./favicon.ico">
  <link rel="manifest" href="./manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="自習室">
  <meta name="theme-color" content="#134E6F">

  <style>
    html, body { margin: 0; height: 100%; background: #134E6F; }
    #loading {
      position: fixed; inset: 0;
      display: flex; align-items: center; justify-content: center;
      color: #fff; font: 14px/1.6 -apple-system, "Hiragino Kaku Gothic ProN", sans-serif;
    }
    #frame { position: fixed; inset: 0; width: 100%; height: 100%; border: 0; }
  </style>
</head>
<body>
  <!-- ▼▼▼ ここだけ書き換えてください:GASのウェブアプリURL(https://script.google.com/macros/s/.../exec) ▼▼▼ -->
  <script>
    var GAS_URL = 'ここにGASのウェブアプリURLを貼り付け';
  </script>
  <!-- ▲▲▲ 書き換えはここまで ▲▲▲ -->

  <div id="loading">読み込み中…</div>
  <iframe id="frame" title="夏休み自習室 開放カレンダー" allow="fullscreen"></iframe>

  <script>
    var frame = document.getElementById('frame');
    frame.addEventListener('load', function () {
      var l = document.getElementById('loading');
      if (l) l.remove();
    });
    frame.src = GAS_URL;
  </script>
</body>
</html>
